<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detektif Sains - Zon Main Sains</title>
    <style>
        body {
            font-family: 'Comic Sans MS', sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .game-container {
            background: white;
            width: 100%;
            max-width: 650px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 25px;
            border: 4px solid #1976d2;
            text-align: center;
        }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            font-size: 1.1rem;
            font-weight: bold;
            color: #1565c0;
            margin-bottom: 20px;
            background: #e3f2fd;
            padding: 10px 15px;
            border-radius: 10px;
        }
        .case-box {
            background: #fffde7;
            border: 3px dashed #fbc02d;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            color: #424242;
            line-height: 1.5;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn-opt {
            background: white;
            border: 2px solid #1976d2;
            padding: 14px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            color: #1976d2;
            transition: 0.2s;
            text-align: left;
        }
        .btn-opt:hover {
            background: #e3f2fd;
        }
        .feedback-box {
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 15px;
            min-height: 35px;
        }
        .btn-next {
            background: #1976d2;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
            display: none;
        }
        .btn-back {
            background: #757575;
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 20px;
            font-weight: bold;
        }
        .level-btn {
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.2s;
        }
        .level-btn:hover {
            transform: scale(1.02);
            filter: brightness(0.9);
        }
    </style>
</head>
<body>

<div class="game-container">
    <!-- START SCREEN -->
    <div id="start-screen">
        <div style="font-size: 5rem;">🔍</div>
        <h1 style="color: #1976d2; margin-bottom: 5px;">Detektif Sains KSSR</h1>
        <p style="color: #555; font-size: 1.1rem; max-width: 450px; margin: 0 auto 25px auto;">
            Pilih kumpulan tahun anda. Sistem akan menapis <b>20 soalan rawak</b> daripada bank data kes KSSR Semakan!
        </p>
        
        <div style="max-width: 400px; margin: 0 auto;">
            <button class="level-btn" style="background: #2e7d32;" onclick="mulaGame('1-2')">TAHUN 1 & 2 🎒</button>
            <button class="level-btn" style="background: #e65100;" onclick="mulaGame('3-4')">TAHUN 3 & 4 🧠</button>
            <button class="level-btn" style="background: #c62828;" onclick="mulaGame('5-6')">TAHUN 5 & 6 ⚡</button>
        </div>
        <br>
        <a href="../index.html" class="btn-back">⬅️ KEMBALI</a>
    </div>

    <!-- GAMEPLAY SCREEN -->
    <div id="game-screen" style="display: none;">
        <div class="stats-bar">
            <div>Mata: <span id="score-txt">0</span> ⭐</div>
            <div>Misi: <span id="progress-txt">1/20</span></div>
        </div>

        <div class="case-box">
            <span style="font-size: 2rem;">📝</span>
            <div id="case-text">Memuatkan fail kes...</div>
        </div>

        <div class="options-container" id="options-area"></div>
        <div class="feedback-box" id="feedback-txt"></div>
        <button class="btn-next" id="next-btn" onclick="kesSeterusnya()">KES SETERUSNYA ➔</button>
    </div>

    <!-- RESULT SCREEN -->
    <div id="result-screen" style="display: none;">
        <div style="font-size: 5rem;">🏆</div>
        <h2>Siasatan Selesai!</h2>
        <p style="font-size: 1.2rem; color: #555;">Tahniah Detektif KSSR, markah anda:</p>
        <h1 style="color: #1976d2; font-size: 3.5rem;" id="final-score">0/20</h1>
        <a href="../index.html" class="btn-back">⬅️ KEMBALI KE MENU UTAMA</a>
    </div>
</div>

<script>
    // BANK DATA KSSR - DITAG IKUT TAHUN SPESIFIK (1 hingga 6)
    const bankKes = [
        // TAHUN 1
        { thn: 1, q: "Antara berikut, yang manakah merupakan benda hidup?", o: ["Kereta mainan", "Anak kucing", "Batu sungai", "Pensel warna"], c: 1 },
        { thn: 1, q: "Kita gunakan deria apa untuk mendengar bunyi loceng sekolah?", o: ["Deria penglihatan (Mata)", "Deria pendengaran (Telinga)", "Deria rasa (Lidah)", "Deria sentuhan (Kulit)"], c: 1 },
        { thn: 1, q: "Antara objek berikut, yang manakah boleh menyerap air dengan banyak?", o: ["Kain tuala", "Plastik pembungkus", "Sudu besi", "Guli kaca"], c: 0 },
        { thn: 1, q: "Apakah yang akan berlaku jika magnet didekatkan dengan sebatang paku besi?", o: ["Paku besi akan melompat lari", "Paku besi akan ditarik oleh magnet", "Paku besi akan hancur", "Tiada apa-apa berlaku"], c: 1 },
        { thn: 1, q: "Antara benda berikut, yang manakah BUKAN benda hidup?", o: ["Pokok betik", "Burung hantu", "Anak patung", "Cacing tanah"], c: 2 },
        { thn: 1, q: "Apakah yang diperlukan oleh manusia untuk bernafas dengan baik?", o: ["Air sirap", "Udara (Oksigen)", "Makanan manis", "Cahaya lampu"], c: 1 },
        { thn: 1, q: "Apakah yang akan terjadi kepada pokok bunga jika tidak disiram air selama dua minggu?", o: ["Pokok membesar gergasi", "Pokok akan layu dan mati", "Pokok bertukar jadi batu", "Pokok keluar emas"], c: 1 },
        { thn: 1, q: "Apakah bahagian tumbuhan yang berfungsi untuk menyerap air dari dalam tanah?", o: ["Bunga", "Akar", "Daun", "Ranting"], c: 1 },

        // TAHUN 2
        { thn: 2, q: "Seketul ais diletakkan di atas meja. Selepas beberapa minit, ais itu cair menjadi air. Mengapa?", o: ["Ais menerima haba daripada persekitaran", "Ais kehilangan udara", "Meja itu menyedut ais", "Ais takut lampu"], c: 0 },
        { thn: 2, q: "Mengapakah kita sukar membaca buku di dalam bilik yang gelap gelita?", o: ["Sebab buku itu tiada tulisan", "Kerana mata memerlukan cahaya untuk melihat objek", "Sebab bilik gelap sangat sejuk", "Sebab buku itu tidur"], c: 1 },
        { thn: 2, q: "Antara objek berikut, yang manakah akan terapung apabila dimasukkan ke dalam air?", o: ["Kunci besi", "Guli kaca", "Duit syiling", "Sudu plastik ringan"], c: 3 },
        { thn: 2, q: "Sebuah kereta mainan bergerak lebih laju di atas lantai jubin berbanding di atas permaidani. Kenapa?", o: ["Lantai jubin mempunyai kurang daya geseran", "Permaidani ada magnet", "Kereta mainan malas bergerak", "Lantai jubin tiada graviti"], c: 0 },
        { thn: 2, q: "Apakah tindakan yang betul apabila sebotol air minuman tertumpah di lantai Bilik Sains?", o: ["Biarkan sahaja", "Lap segera menggunakan kain tuala atau mop", "Lari keluar dari bilik", "Sembunyikan bawah meja"], c: 1 },
        { thn: 2, q: "Antara berikut, yang manakah merupakan keperluan asas bagi biji benih untuk bercambah?", o: ["Air, udara dan suhu yang sesuai", "Gula, garam dan kicap", "Cahaya lampu dan baja kimia", "Tanah hitam sahaja"], c: 0 },
        { thn: 2, q: "Mengapakah kita perlu beratur dengan tertib sebelum masuk ke dalam Bilik Sains?", o: ["Sebab mahu ambil makanan", "Untuk menjaga disiplin dan keselamatan diri", "Sebab mahu bermain", "Sebab guru tiada di dalam"], c: 1 },
        { thn: 2, q: "Campuran pasir dan klip kertas besi boleh dipisahkan dengan cepat menggunakan...", o: ["Tapis tepung", "Magnet", "Air paip", "Kertas turas"], c: 1 },

        // TAHUN 3
        { thn: 3, q: "Apakah fungsi utama gigi taring pada haiwan karnivor seperti harimau?", o: ["Untuk mengunyah rumput", "Untuk mengoyakkan daging", "Untuk menghisap madu", "Untuk menggigit kayu"], c: 1 },
        { thn: 3, q: "Ramalkan rasa sejenis cecair buah sekiranya ia menukarkan kertas litmus merah menjadi biru.", o: ["Rasanya masam", "Rasanya pahit atau beralkali", "Rasanya tawar", "Rasanya sangat pedas"], c: 1 },
        { thn: 3, q: "Apakah planet yang berada paling dekat dengan Matahari di dalam Sistem Suria?", o: ["Bumi", "Utarid", "Zuhal", "Marikh"], c: 1 },
        { thn: 3, q: "Ramalkan apakah yang akan berlaku pada makanan di dalam mulut jika manusia tidak mempunyai gigi geraham.", o: ["Makanan mudah ditelan", "Makanan tidak dapat dihancurkan dengan lumat", "Makanan menjadi manis", "Gigi taring akan tumbuh panjang"], c: 1 },
        { thn: 3, q: "Apakah ejen atau komponen mekanikal yang digunakan untuk menaikkan bendera di tiang sekolah dengan mudah?", o: ["Tali getah", "Takal", "Magnet", "Gigi roda"], c: 1 },

        // TAHUN 4
        { thn: 4, q: "Dua ekor tikus diletakkan di dalam sebuah bekas kedap udara yang ditutup rapat. Selepas 2 jam, tikus-tikus itu mati. Apakah inferensnya?", o: ["Tikus mati kekurangan makanan", "Tikus mati kerana kehabisan oksigen untuk bernafas", "Bekas itu terlalu sempit", "Tikus bergaduh sesama sendiri"], c: 1 },
        { thn: 4, q: "Ramalkan apa yang berlaku kepada haiwan di bumi jika semua tumbuhan di dunia ini mati tiba-tiba.", o: ["Haiwan akan makan tanah", "Haiwan akan mati kerana kehilangan sumber makanan dan oksigen", "Haiwan karnivor akan hidup selamanya", "Haiwan akan bertukar menjadi tumbuhan"], c: 1 },
        { thn: 4, q: "Pokok herba yang ditanam rapat-rapat tumbuh tinggi dan kurus berbanding pokok yang ditanam jarak-jarak. Kenapa?", o: ["Pokok bersaing hebat untuk mendapatkan cahaya matahari", "Pokok yang rapat saling berkongsi daun", "Pekebun lupa menyiram pokok", "Pokok kurus lebih sihat"], c: 0 },
        { thn: 4, q: "Sebiji bola tenis dan seketul batu bata dilepaskan pada ketinggian yang sama. Batu bata mencecah tanah dahulu. Apakah inferensnya?", o: ["Batu bata ditarik oleh graviti lebih kuat kerana jisimnya lebih besar", "Bola tenis melayang sendiri", "Batu bata bergerak aktif", "Bumi tidak suka bola tenis"], c: 0 },
        { thn: 4, q: "Apakah proses utama tumbuhan hijau menghasilkan makanannya sendiri dengan bantuan cahaya matahari?", o: ["Pencernaan", "Fotosintesis", "Penyejatan", "Kondensasi"], c: 1 },
        { thn: 4, q: "Apabila cahaya matahari terkena pada permukaan cermin, cahaya itu akan melantun balik. Fenomena ini dinamakan...", o: ["Pembiasan cahaya", "Pantulan cahaya", "Penyerapan cahaya", "Pecahan cahaya"], c: 1 },
        { thn: 4, q: "Sebutir pensel kelihatan bengkok apabila dimasukkan ke dalam segelas air. Ini disebabkan oleh sifat cahaya iaitu...", o: ["Cahaya boleh dipantulkan", "Cahaya boleh dibiaskan apabila bergerak melalui dua medium berbeza", "Cahaya bergerak lurus", "Cahaya menghasilkan bayang-bayang"], c: 1 },
        { thn: 4, q: "Antara haiwan berikut, yang manakah bernafas menggunakan organ insang?", o: ["Paus", "Ikan lampam", "Kucing", "Burung merpati"], c: 1 },

        // TAHUN 5
        { thn: 5, q: "Seorang murid memakai baju sukan berwarna hitam di padang pada waktu tengah hari yang terik. Dia terasa sangat panas. Kenapa?", o: ["Warna hitam memantulkan haba matahari", "Warna hitam menyerap haba dengan baik", "Baju hitam kainnya tebal", "Baju hitam menghalang angin bertiup"], c: 1 },
        { thn: 5, q: "Satu eksperimen menunjukkan mentol menyala lebih terang apabila bilangan sel kering ditambah. Ramalkan jika kita menambah 5 biji mentol tanpa menambah sel kering.", o: ["Mentol menyala semakin malap", "Mentol menyala semakin terang", "Sel kering akan meletup", "Litar akan terbakar"], c: 0 },
        { thn: 5, q: "Sudu besi dan sudu plastik diletakkan di dalam secawan air panas. Selepas 3 minit, sudu besi terasa sangat panas tetapi sudu plastik tidak. Kenapa?", o: ["Besi ialah konduktor haba yang baik, plastik ialah penebat haba", "Plastik menyerap haba lebih cepat daripada besi", "Sudu besi saiznya lebih besar", "Air panas hanya menyukai sudu besi"], c: 0 },
        { thn: 5, q: "Air di dalam gelas yang berisi ais mempunyai titisan air di bahagian luar gelas. Dari mana datangnya air itu?", o: ["Air bocor dari dalam gelas", "Kondensasi wap air di udara apabila menyentuh permukaan gelas yang sejuk", "Ais melimpah keluar", "Udara bertukar menjadi ais"], c: 1 },
        { thn: 5, q: "Seutas tali getah ditarik panjang lalu dilepaskan. Ia kembali ke bentuk asal. Apakah sifat bahan ini?", o: ["Kekenyalan", "Kerapuhan", "Konduktor", "Ketelusan"], c: 0 },
        { thn: 5, q: "Satu mentol dalam litar selari terbakar, tetapi mentol yang lain masih menyala. Mengapa situasi ini berlaku?", o: ["Sebab tenaga elektrik melompat", "Sebab dalam litar selari, arus elektrik mempunyai lebih daripada satu laluan", "Sebab mentol lain menggunakan bateri berbeza", "Sebab mentol yang terbakar itu tidak penting"], c: 1 },
        { thn: 5, q: "Sebiji belon yang ditiup diletakkan di bawah cahaya matahari terik. Selepas 30 minit, belon itu meletup. Kenapa?", o: ["Udara di dalam belon mengecut", "Udara di dalam belon menerima haba dan mengembang", "Cahaya matahari memotong getah belon", "Belon menjadi terlalu sejuk"], c: 1 },
        { thn: 5, q: "Dua buah bekas, satu berwarna putih dan satu berwarna hitam diisi air dengan suhu yang sama, lalu dijemur. Selepas 1 jam, air dalam bekas hitam lebih panas. Kenapa?", o: ["Permukaan hitam menyerap haba lebih baik daripada permukaan putih", "Bekas putih memancarkan haba ke dalam air", "Bekas hitam diperbuat daripada api", "Bekas putih bocor haba"], c: 0 },

        // TAHUN 6
        { thn: 6, q: "Dua biji ragi dimasukkan ke dalam air suam berisi gula. Selepas 15 minit, belon di atas botol mengembang. Ramalkan jika gula digantikan dengan garam.", o: ["Belon tetap berkembang besar", "Belon tidak berkembang kerana ragi memerlukan gula untuk aktif", "Botol akan pecah", "Ragi akan membiak dua kali ganda"], c: 1 },
        { thn: 6, q: "Paku besi dibiarkan di bawah hujan selama seminggu lalu bertukar warna menjadi perang kemerahan. Apakah inferens anda?", o: ["Paku telah melebur", "Paku telah mengalami pengaratan akibat kehadiran air dan oksigen", "Paku dicat oleh seseorang", "Paku bertukar menjadi tembaga"], c: 1 },
        { thn: 6, q: "Seekor haiwan mempunyai bulu yang sangat tebal dan lapisan lemak yang tebal di bawah kulitnya. Ramalkan di manakah habitat semula jadi haiwan ini.", o: ["Kawasan gurun pasir yang kering", "Kawasan kutub yang sangat sejuk", "Hutan hujan tropika", "Kawasan paya bakau"], c: 1 },
        { thn: 6, q: "Pemerhatian menunjukkan air laut semakin berkurangan di kawasan pantai sebelum gelombang tsunami gergasi datang. Ramalkan apa yang patut dilakukan penduduk pantai.", o: ["Pergi mengumpul ikan yang terdampar", "Lari bertindak segera ke kawasan yang lebih tinggi dan selamat", "Duduk di pantai mengambil gambar", "Masuk ke dalam bot masing-masing"], c: 1 },
        { thn: 6, q: "Satu penyiasatan mendapati yis tidak berkembang apabila diletakkan di dalam air yang mendidih. Berikan inferens.", o: ["Air mendidih terlalu manis", "Suhu yang terlalu tinggi telah membunuh mikroorganisma (yis)", "Yis bertukar menjadi tepung", "Yis melarikan diri"], c: 1 },
        { thn: 6, q: "Tumbuhan X mempunyai buah yang berbulu halus, ringan, dan mempunyai ruang udara di dalamnya. Ramalkan cara agen pencaran buah ini.", o: ["Melalui haiwan", "Melalui air", "Melalui angin", "Mekanisme letupan"], c: 2 },
        { thn: 6, q: "Satu eksperimen menunjukkan bahawa minyak yang dituangkan di atas permukaan air di dalam akuarium menyebabkan ikan mati selepas beberapa jam. Inferenskan.", o: ["Lapisan minyak menghalang oksigen dari udara larut ke dalam air", "Ikan makan minyak tersebut", "Minyak menurunkan suhu air", "Ikan menjadi terlalu licin"], c: 0 },
        { thn: 6, q: "Ramalkan apakah yang berlaku kepada populasi beluncas jika bilangan burung (pemangsa beluncas) di taman itu berkurangan secara mendadak.", o: ["Populasi beluncas akan berkurangan", "Populasi beluncas akan meningkat dengan cepat", "Beluncas akan bertukar menjadi burung", "Beluncas akan berpindah ke taman lain"], c: 1 },
        { thn: 6, q: "Satu kawasan hutan telah ditebang habis untuk pembinaan perumahan. Ramalkan kesan jangka panjang kepada alam sekitar kawasan itu.", o: ["Suhu kawasan sekitar menjadi lebih sejuk", "Kejadian banjir kilat dan tanah runtuh mudah berlaku", "Bilangan haiwan liar bertambah", "Udara menjadi semakin segar"], c: 1 },
        { thn: 6, q: "Satu rantaian makanan: Padi ➔ Belalang ➔ Katak ➔ Ular. Ramalkan apa yang berlaku kepada populasi belalang jika semua katak ditangkap.", o: ["Populasi belalang akan berkurangan", "Populasi belalang akan meningkat", "Belalang akan mula makan ular", "Belalang akan bertukar menjadi katak"], c: 1 }
    ];

    let urutanKes = [];
    let indeksSemasa = 0;
    let markahMata = 0;

    function mulaGame(gredRegime) {
        document.getElementById("start-screen").style.display = "none";
        document.getElementById("game-screen").style.display = "block";
        
        let soalanDitapis = [];
        if (gredRegime === '1-2') {
            soalanDitapis = bankKes.filter(item => item.thn === 1 || item.thn === 2);
        } else if (gredRegime === '3-4') {
            soalanDitapis = bankKes.filter(item => item.thn === 3 || item.thn === 4);
        } else if (gredRegime === '5-6') {
            soalanDitapis = bankKes.filter(item => item.thn === 5 || item.thn === 6);
        }

        // Rawakkan susunan dan ambil maksimum 20 soalan sahaja
        urutanKes = soalanDitapis.sort(() => Math.random() - 0.5).slice(0, 20);
        indeksSemasa = 0;
        markahMata = 0;
        paparKes();
    }

    function paparKes() {
        document.getElementById("next-btn").style.display = "none";
        document.getElementById("feedback-txt").innerText = "";
        
        let dataKes = urutanKes[indeksSemasa];
        document.getElementById("progress-txt").innerText = `${indeksSemasa + 1}/${urutanKes.length}`;
        document.getElementById("score-txt").innerText = markahMata;
        document.getElementById("case-text").innerText = dataKes.q;

        let areaPilihan = document.getElementById("options-area");
        areaPilihan.innerHTML = "";

        dataKes.o.forEach((opsi, id) => {
            let butang = document.createElement("button");
            butang.className = "btn-opt";
            butang.innerText = `${String.fromCharCode(65 + id)}. ${opsi}`;
            butang.onclick = () => semakJawapanKes(id, butang);
            areaPilihan.appendChild(butang);
        });
    }

    function semakJawapanKes(pilihanId, elemenButang) {
        let dataKes = urutanKes[indeksSemasa];
        let semuaButang = document.querySelectorAll(".btn-opt");
        
        semuaButang.forEach(b => b.disabled = true);

        if (pilihanId === dataKes.c) {
            markahMata++;
            document.getElementById("score-txt").innerText = markahMata;
            elemenButang.style.background = "#c8e6c9";
            elemenButang.style.borderColor = "#2e7d32";
            elemenButang.style.color = "#2e7d32";
            document.getElementById("feedback-txt").innerText = "✅ KES DISELESAIKAN! Jawapan anda tepat.";
            document.getElementById("feedback-txt").style.color = "#2e7d32";
        } else {
            elemenButang.style.background = "#ffcdd2";
            elemenButang.style.borderColor = "#c62828";
            elemenButang.style.color = "#c62828";
            
            semuaButang[dataKes.c].style.background = "#c8e6c9";
            semuaButang[dataKes.c].style.borderColor = "#2e7d32";
            semuaButang[dataKes.c].style.color = "#2e7d32";
            
            document.getElementById("feedback-txt").innerText = "❌ KES GAGAL! Siasatan kurang tepat.";
            document.getElementById("feedback-txt").style.color = "#c62828";
        }

        document.getElementById("next-btn").style.display = "block";
    }

    function kesSeterusnya() {
        indeksSemasa++;
        if (indeksSemasa < urutanKes.length) {
            paparKes();
        } else {
            document.getElementById("game-screen").style.display = "none";
            document.getElementById("result-screen").style.display = "block";
            document.getElementById("final-score").innerText = `${markahMata}/${urutanKes.length}`;
        }
    }
</script>

</body>
</html>
