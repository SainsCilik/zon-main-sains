  <!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabaran Peta Alir & Fakta - Zon Main Sains</title>
    <style>
        body {
            font-family: 'Comic Sans MS', sans-serif;
            background-color: #f3e5f5;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .game-container {
            background: white;
            width: 100%;
            max-width: 650px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            padding: 25px;
            border: 4px solid #7b1fa2;
            text-align: center;
        }
        .flow-box {
            background: #f3e5f5;
            border: 2px dashed #ba68c8;
            border-radius: 12px;
            padding: 20px;
            margin: 15px 0;
            font-size: 1.3rem;
            font-weight: bold;
            color: #4a148c;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .flow-step {
            background: white;
            padding: 8px 15px;
            border-radius: 8px;
            border: 2px solid #7b1fa2;
        }
        .arrow { color: #7b1fa2; font-weight: bold; }
        .btn-option {
            display: block;
            width: 100%;
            background: white;
            border: 3px solid #e1bee7;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            font-size: 1.15rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            color: #4a148c;
            text-align: left;
        }
        .btn-option:hover { background: #f3e5f5; border-color: #ba68c8; }
        .feedback {
            font-size: 1.3rem;
            font-weight: bold;
            margin-top: 15px;
            min-height: 35px;
        }
        .btn-next {
            background: #7b1fa2;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
            display: none;
            width: 100%;
        }
        .btn-back {
            background: #757575;
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="game-container">
    <!-- START SCREEN -->
    <div id="start-screen">
        <div style="font-size: 5rem;">🔄</div>
        <h1 style="color: #7b1fa2;">Cabaran Peta Alir & Fakta Sains</h1>
        <p style="color: #555; font-size: 1.1rem; max-width: 450px; margin: 0 auto 20px auto;">
            Selesaikan misteri urutan proses sains (Peta Alir) dan jawab cabaran kuiz kilat Fakta vs Mitos!
        </p>
        <button onclick="mulaGame()" style="background: #7b1fa2; color: white; border: none; padding: 15px 35px; font-size: 1.2rem; font-weight: bold; border-radius: 12px; cursor: pointer; box-shadow: 0 5px 10px rgba(0,0,0,0.15);">MULA CABARAN 🚀</button>
        <br>
        <a href="../index.html" class="btn-back">⬅️ KEMBALI</a>
    </div>

    <!-- GAMEPLAY SCREEN -->
    <div id="game-screen" style="display: none;">
        <h3 style="color: #7b1fa2; margin: 0;" id="level-title">SOALAN 1/5</h3>
        <p id="question-text" style="font-size: 1.2rem; font-weight: bold; color: #333;">Memuatkan cabaran...</p>

        <div id="flow-area"></div>

        <div id="options-area"></div>
        <div class="feedback" id="feedback-text"></div>
        <button class="btn-next" id="next-btn" onclick="seterusnya()">SETERUSNYA ➔</button>
    </div>

    <!-- RESULT SCREEN -->
    <div id="result-screen" style="display: none;">
        <div style="font-size: 5rem;">🏆</div>
        <h2>Misi Tamat!</h2>
        <p style="font-size: 1.2rem; color: #555;">Skor kejuaraan sains anda:</p>
        <h1 style="color: #7b1fa2; font-size: 3.5rem;" id="final-score">0/5</h1>
        <a href="../index.html" class="btn-back">⬅️ KEMBALI KE MENU UTAMA</a>
    </div>
</div>

<script>
    const bankSoalan = [
        {
            type: "flow",
            text: "Lengkapkan peta alir laluan udara semasa manusia MENARIK NAFAS:",
            steps: ["Hidung", "???", "Peparu"],
            options: ["Trakea", "Mulut", "Abdomen", "Perut"],
            correct: 0,
            explain: "Tepat! Laluan udara masuk ialah Hidung ➔ Trakea ➔ Peparu."
        },
        {
            type: "flow",
            text: "Susun urutan yang betul bagi KITARAN HIDUP seekor katak:",
            steps: ["Telur", "???", "Katak Muda", "Katak Dewasa"],
            options: ["Berudu", "Beluncas", "Pupa", "Nyamuk"],
            correct: 0,
            explain: "Bijak! Selepas telur menetas, ia menjadi berudu sebelum tumbuh kaki."
        },
        {
            type: "fact",
            text: "Fakta atau Mitos: 'Bulan tidak menghasilkan cahayanya sendiri, ia hanya memantulkan cahaya matahari.'",
            options: ["FAKTA ✅", "MITOS ❌"],
            correct: 0,
            explain: "Betul! Bulan adalah satelit semulajadi yang memantulkan cahaya dari matahari."
        },
        {
            type: "fact",
            text: "Fakta atau Mitos: 'Semua jenis tumbuhan di dunia ini membiak melalui biji benih sahaja.'",
            options: ["FAKTA ✅", "MITOS ❌"],
            correct: 1,
            explain: "Tepat! Ada tumbuhan membiak guna spora (cendawan), keratan batang (ubi kayu), atau anak pokok (pisang)."
        },
        {
            type: "flow",
            text: "Lengkapkan aliran tenaga elektrik di dalam suatu litar siri lengkap:",
            steps: ["Sel Kering", "Suis", "???", "Wayar Penyambung"],
            options: ["Mentol", "Magnet", "Air", "Gunting"],
            correct: 0,
            explain: "Terbaik! Tenaga elektrik mengalir untuk menyalakan mentol di dalam litar."
        }
    ];

    let indexSln = 0;
    let markah = 0;
    let dahJawab = false;

    function mulaGame() {
        document.getElementById("start-screen").style.display = "none";
        document.getElementById("game-screen").style.display = "block";
        paparSoalan();
    }

    function paparSoalan() {
        dahJawab = false;
        document.getElementById("next-btn").style.display = "none";
        document.getElementById("feedback-text").innerText = "";
        
        let sln = bankSoalan[indexSln];
        document.getElementById("level-title").innerText = `SOALAN ${indexSln + 1} / ${bankSoalan.length}`;
        document.getElementById("question-text").innerText = sln.text;

        let flowArea = document.getElementById("flow-area");
        flowArea.innerHTML = "";

        if (sln.type === "flow") {
            let container = document.createElement("div");
            container.className = "flow-box";
            
            sln.steps.forEach((step, i) => {
                let div = document.createElement("span");
                div.className = "flow-step";
                div.innerText = step;
                container.appendChild(div);
                
                if (i < sln.steps.length - 1) {
                    let arrow = document.createElement("span");
                    arrow.className = "arrow";
                    arrow.innerText = "➔";
                    container.appendChild(arrow);
                }
            });
            flowArea.appendChild(container);
        }

        let optsArea = document.getElementById("options-area");
        optsArea.innerHTML = "";

        sln.options.forEach((opt, idx) => {
            let btn = document.createElement("button");
            btn.className = "btn-option";
            btn.innerText = opt;
            btn.onclick = () => semakJawapan(idx, btn);
            optsArea.appendChild(btn);
        });
    }

    function semakJawapan(pilihan, elemen) {
        if (dahJawab) return;
        dahJawab = true;

        let sln = bankSoalan[indexSln];
        let btns = document.querySelectorAll(".btn-option");

        if (pilihan === sln.correct) {
            markah++;
            elemen.style.background = "#e8f5e9";
            elemen.style.borderColor = "#2e7d32";
            document.getElementById("feedback-text").innerText = "✅ " + sln.explain;
            document.getElementById("feedback-text").style.color = "#2e7d32";
        } else {
            elemen.style.background = "#ffe0b2";
            elemen.style.borderColor = "#e65100";
            btns[sln.correct].style.background = "#e8f5e9";
            btns[sln.correct].style.borderColor = "#2e7d32";
            document.getElementById("feedback-text").innerText = "❌ Kurang tepat! Jawapan yang sepadan telah diwarnakan hijau.";
            document.getElementById("feedback-text").style.color = "#e65100";
        }
        document.getElementById("next-btn").style.display = "block";
    }

    function seterusnya() {
        indexSln++;
        if (indexSln < bankSoalan.length) {
            paparSoalan();
        } else {
            document.getElementById("game-screen").style.display = "none";
            document.getElementById("result-screen").style.display = "block";
            document.getElementById("final-score").innerText = `${markah}/${bankSoalan.length}`;
        }
    }
</script>

</body>
</html>
